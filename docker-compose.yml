version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: tripmind_db
    environment:
      POSTGRES_DB: travel_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - tripmind_pg_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tripmind_app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/travel_ai
      - DB_DRIVER=org.postgresql.Driver
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JPA_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - JPA_DDL_AUTO=update
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:8080,http://localhost:3000

volumes:
  tripmind_pg_data:
