<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - TripMind AI</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="display:flex; flex-direction:column; min-height:100vh;">
  <!-- Navbar -->
  <nav class="navbar scrolled">
    <div class="container">
      <a href="index.html" class="nav-logo"><span>✈️</span> TripMind AI</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact</a>
        <a href="login.html" class="btn btn-outline" style="padding:8px 16px;">Log In</a>
      </div>
    </div>
  </nav>

  <div class="container" style="flex:1; display:flex; align-items:center; justify-content:center; padding-top:100px; padding-bottom:60px;">
    <div class="card" style="width:100%; max-width:400px; padding:40px;">
      <h2 style="margin-bottom:24px; text-align:center;">Create Account</h2>
      <form id="registerForm">
        <div style="margin-bottom:20px;">
          <label style="display:block; margin-bottom:8px; color:var(--text-secondary);">Full Name</label>
          <input type="text" id="name" required style="width:100%; padding:14px; border-radius:12px; border:1px solid var(--border-color); background:var(--bg-primary); color:var(--text-primary);">
        </div>
        <div style="margin-bottom:20px;">
          <label style="display:block; margin-bottom:8px; color:var(--text-secondary);">Email</label>
          <input type="email" id="email" required style="width:100%; padding:14px; border-radius:12px; border:1px solid var(--border-color); background:var(--bg-primary); color:var(--text-primary);">
        </div>
        <div style="margin-bottom:24px;">
          <label style="display:block; margin-bottom:8px; color:var(--text-secondary);">Password</label>
          <input type="password" id="password" required style="width:100%; padding:14px; border-radius:12px; border:1px solid var(--border-color); background:var(--bg-primary); color:var(--text-primary);">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Sign Up</button>
        <p id="errorMsg" style="color:var(--danger); margin-top:16px; text-align:center; display:none;"></p>
      </form>
      <p style="text-align:center; margin-top:24px; color:var(--text-secondary);">Already have an account? <a href="login.html" style="color:var(--text-accent);">Log In</a></p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    const API_BASE = window.TRIPMIND_CONFIG?.apiBase || '/api';
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = this.querySelector('button');
      btn.textContent = 'Creating...';
      
      const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      };

      fetch(`${API_BASE}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(async res => {
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Failed to register');
        }
        return res.json();
      })
      .then(user => {
        localStorage.setItem('user', JSON.stringify(user));
        window.location.href = 'dashboard.html';
      })
      .catch(err => {
        const errEl = document.getElementById('errorMsg');
        errEl.textContent = '❌ ' + err.message;
        errEl.style.display = 'block';
        btn.textContent = 'Sign Up';
      });
    });
  </script>
</body>
</html>
