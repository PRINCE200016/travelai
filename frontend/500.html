<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 - Server Error | YourApp</title>
  <meta name="description" content="Temporary server issue on YourApp." />
  <meta name="robots" content="noindex" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%E2%9A%A0%EF%B8%8F%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0f0f1b;--card:#1a1a2fcc;--text:#f2f2ff;--muted:#b8b8d8;--line:#323254;
      --brand:#ff7a59;--brand2:#ffcd58;--shadow:0 16px 50px rgba(0,0,0,.35)
    }
    @media (prefers-color-scheme: light){
      :root{--bg:#faf7f3;--card:#ffffffdd;--text:#1f2434;--muted:#626a82;--line:#e2dfd9;--shadow:0 12px 35px rgba(20,35,90,.12)}
    }
    *{box-sizing:border-box} html,body{height:100%}
    body{
      margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);
      display:grid;place-items:center;padding:20px;
      background-image:radial-gradient(900px 500px at 5% -10%,#ff7a5922,transparent),radial-gradient(900px 500px at 95% 110%,#ffcd5822,transparent)
    }
    main{
      width:min(920px,100%);background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);
      padding:clamp(20px,4vw,44px);display:grid;gap:20px;backdrop-filter:blur(8px)
    }
    .top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .brand{font-weight:900}.brand b{background:linear-gradient(120deg,var(--brand),var(--brand2));-webkit-background-clip:text;background-clip:text;color:transparent}
    .chip{border:1px solid var(--line);padding:8px 12px;border-radius:999px;font-size:.85rem;color:var(--muted)}
    .wrap{display:grid;grid-template-columns:1.2fr 1fr;gap:24px;align-items:center}
    @media (max-width:860px){.wrap{grid-template-columns:1fr}}
    h1{margin:0;font-size:clamp(2.2rem,7vw,5rem);line-height:1;font-weight:900}
    .big{font-size:clamp(1.15rem,2.6vw,1.6rem);font-weight:800;margin:10px 0}
    p{margin:8px 0 0;color:var(--muted);line-height:1.65}
    .actions{margin-top:18px;display:flex;flex-wrap:wrap;gap:10px}
    .btn{border:1px solid var(--line);padding:12px 16px;border-radius:12px;text-decoration:none;color:var(--text);font-weight:700;display:inline-flex;align-items:center;gap:8px;transition:.2s transform}
    .btn:hover{transform:translateY(-1px)}
    .btn.primary{background:linear-gradient(120deg,var(--brand),var(--brand2));color:#1c1c1c;border:none}
    .art{position:relative;min-height:230px;display:grid;place-items:center}
    .cloud{width:220px;height:90px;background:#fff2;border:1px solid #fff4;border-radius:999px;position:relative;animation:float 4.3s ease-in-out infinite}
    .cloud:before,.cloud:after{content:"";position:absolute;background:inherit;border:inherit;border-radius:50%}
    .cloud:before{width:90px;height:90px;left:26px;top:-34px}
    .cloud:after{width:110px;height:110px;right:24px;top:-46px}
    .bolt{position:absolute;bottom:45px;left:52%;transform:translateX(-50%);font-size:56px;animation:flick 1.6s infinite}
    @keyframes flick{50%{opacity:.45;transform:translateX(-50%) scale(.94)}}
    @keyframes float{50%{transform:translateY(-8px)}}
  </style>
</head>
<body>
  <main aria-labelledby="title">
    <div class="top">
      <div class="brand">⚡ <b>YourApp</b></div>
      <div class="chip" aria-label="Error status">Error 500</div>
    </div>
    <section class="wrap">
      <div>
        <h1 id="title">500</h1>
        <div class="big">Our server is having a bad day 😅</div>
        <p>Something broke on our side while processing your request. YourApp is still here, just taking a quick technical coffee break.</p>
        <p>Translation: not your fault. We are on it.</p>
        <div class="actions">
          <a class="btn primary" href="/index.html" aria-label="Go to home page">🏠 Go Home</a>
          <button class="btn" type="button" onclick="location.reload()" aria-label="Retry loading this page">🔄 Retry</button>
          <a class="btn" href="mailto:support@yourapp.com" aria-label="Contact support by email">💬 Contact Support</a>
        </div>
      </div>
      <div class="art" aria-hidden="true">
        <div class="cloud"></div>
        <div class="bolt">⚡</div>
      </div>
    </section>
  </main>
</body>
</html>
