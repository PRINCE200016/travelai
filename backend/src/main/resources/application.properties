# ===== TripMind AI - Application Configuration =====

# Server
server.port=8080

# ===== Database Config =====
# Production-ready env-driven datasource.
# For Supabase set:
# DB_URL=jdbc:postgresql://<host>:5432/postgres?sslmode=require
# DB_USER=postgres.<project-ref>
# DB_PASSWORD=<db-password>
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/travel_ai}
spring.datasource.driverClassName=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# Uncomment below for MySQL (replace values):
# spring.datasource.url=jdbc:mysql://localhost:3306/travel_ai?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=yourpassword

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

# ===== API Keys (set via environment variables or .env) =====
gemini.api.key=${GEMINI_API_KEY:demo}
weather.api.key=${WEATHER_API_KEY:demo}

# ===== CORS =====
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080}

# ===== Admin Auth =====
admin.username=${ADMIN_USER:admin}
admin.password=${ADMIN_PASS:change_this_in_production}

# ===== Email Configuration =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER:demo}
spring.mail.password=${EMAIL_PASS:demo}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===== Logging =====
logging.level.com.tripmind=${APP_LOG_LEVEL:INFO}

# ===== Production Readiness =====
spring.jpa.open-in-view=false

# ===== Monitoring =====
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
